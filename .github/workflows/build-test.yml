name: Build_Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/README.md"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check littlefs_tools/ tests/

  build_and_test:
    name: Build & Test - ${{ matrix.os }} - Py ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install build tools
        run: pip install build pytest
      - name: Build package
        run: python -m build
      - name: Install wheel
        run: pip install dist/littlefs_tools-*.whl --force
        shell: bash
      - name: Run pytest
        run: pytest tests/ -v
      - name: Run command help
        run: |
          littlefs --help
          littlefs create -h
          littlefs list -h
          littlefs extract -h
          littlefs_create -h
          littlefs_list -h
          littlefs_extract -h
      - name: Run functional tests - default options
        if: runner.os != 'Windows'
        run: |
          cd test
          ./test.sh
      - name: Run functional tests - large file
        if: runner.os != 'Windows'
        run: |
          cd test
          ./test_large.sh
